name: Agent Smoke Tests

on:
  pull_request:
    paths:
      - 'frontend/**'
      - 'src/**'
      - 'backend-supabase/**'

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend deps
        run: npm --prefix frontend ci

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Run smoke tests (if provided)
        run: |
          if npm --prefix frontend run | grep -q "test:smoke"; then
            npm --prefix frontend run test:smoke
          else
            echo "No smoke test script defined; build step completed."
          fi
