name: Agent Smoke Tests

on:
  pull_request:
    paths:
      - 'frontend/**'
      - 'backend-supabase/**'
      - 'workers/**'

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Use Node.js 20
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20

      - name: Install frontend deps
        run: npm --prefix frontend ci

      - name: Build frontend
        run: npm --prefix frontend run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: dummy_key

      - name: Run smoke tests (if provided)
        run: |
          if npm --prefix frontend run | grep -q "test:smoke"; then
            npm --prefix frontend run test:smoke
          else
            echo "No smoke test script defined; build step completed."
          fi
