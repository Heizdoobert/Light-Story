name: Deploy to Production

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '22'

jobs:
  validate:
    name: Lint, Build, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (TypeScript strict)
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Run tests
        run: npm run test:run

  deploy:
    name: Deploy to Cloudflare
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy Cloudflare Workers
        run: |
          npx wrangler deploy --config workers/unified-gateway/wrangler.jsonc
          npx wrangler deploy --config workers/r2-signed-url/wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Push Supabase migrations
        run: npx supabase db push --project-ref xgtlrztskoomimvfpdoy
        working-directory: backend-supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Smoke test deployment
        run: |
          for i in {1..5}; do
            if curl -sf "https://unified-gateway.truyen3new.workers.dev/api/stories?page=1&pageSize=5" > /dev/null 2>&1; then
              echo "Smoke test passed"
              exit 0
            fi
            echo "Attempt $i/5 failed, retrying..."
            sleep 5
          done
          echo "Smoke test failed"
          exit 1

      - name: Notify Slack on failure
        if: failure()
        uses: 8398a7/action-slack@28ba28c25673d05d7b567d26b52a16d56d11b3bc # v3.16.2
        with:
          status: ${{ job.status }}
          text: 'Deployment to production failed!'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
