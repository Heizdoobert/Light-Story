name: Supabase Database Tests

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  database-tests:
    name: Database Migrations and pgTAP Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Start Docker Daemon
        run: |
          sudo systemctl start docker

      - name: Install Supabase CLI
        uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v3.0.0
        with:
          version: latest

      - name: Start Supabase Local Stack
        working-directory: backend-supabase
        run: |
          supabase start

      - name: Run pgTAP SQL Tests
        working-directory: backend-supabase
        run: |
          supabase db test

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Run Node.js RLS Integration Tests
        run: |
          node backend-supabase/supabase/tests/rls-integration.test.js
        env:
          SUPABASE_URL: http://localhost:54321
