# Supabase local development configuration for Light Story
project_id = "light-story"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions", "app_private"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://127.0.0.1:3000"]
jwt_expiry = 3600

[storage]
enabled = true
file_size_limit = "50MiB"
